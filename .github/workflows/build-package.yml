name: Build Package

on:
  workflow_dispatch:
    inputs:
      arch:
        description: OpenWrt SDK architecture or arch-release tag.
        default: aarch64_cortex-a53
        required: false
        type: string
      packages:
        description: Space-separated package list to build.
        default: luci-app-wrtbak
        required: false
        type: string
      container:
        description: SDK container repository.
        default: openwrt/sdk
        required: false
        type: string
  push:

permissions:
  contents: read

jobs:
  package-layout:
    name: Package layout
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Validate package layout
        run: |
          set -euo pipefail
          mkdir -p dist logs

          {
            echo "== required files =="
            test -f Makefile
            test -f root/etc/config/wrtbak
            test -f root/usr/bin/wrtbak
            test -d root/usr/lib/wrtbak
            test -f root/usr/lib/wrtbak/backup.sh
            test -f root/usr/lib/wrtbak/common.sh
            test -f root/usr/lib/wrtbak/manifest.sh
            test -f root/usr/lib/wrtbak/pack.sh
            test -f root/usr/lib/wrtbak/web.sh
            test -f root/usr/lib/wrtbak/items.sh
            test -f htdocs/luci-static/resources/view/wrtbak/index.js
            test -f root/usr/share/luci/menu.d/luci-app-wrtbak.json
            test -f root/usr/share/rpcd/acl.d/luci-app-wrtbak.json
            test -f root/usr/lib/wrtbak/paths.default
            test -f tests/test_cli_fixture.sh
            test -f tests/test_detect_fixture.sh

            echo "== root payload =="
            find root -type f | sort

            echo "== shell syntax =="
            for script in root/usr/bin/wrtbak root/usr/lib/wrtbak/*.sh tests/*.sh; do
              sh -n "$script"
            done

            echo "== example manifests =="
            for manifest in examples/*/manifest.json; do
              python3 -m json.tool "$manifest" >/dev/null
              echo "$manifest"
            done

            echo "== fixture test =="
            sh tests/test_cli_fixture.sh
            sh tests/test_detect_fixture.sh
          } 2>&1 | tee logs/package-layout.log

      - name: Create package source artifact
        run: |
          set -euo pipefail
          mkdir -p dist logs

          git archive --format=tar --prefix=luci-app-wrtbak/ HEAD \
            | gzip -n > dist/luci-app-wrtbak-package-source.tar.gz

          sha256sum dist/luci-app-wrtbak-package-source.tar.gz \
            | tee logs/luci-app-wrtbak-package-source.sha256

          tar tzf dist/luci-app-wrtbak-package-source.tar.gz \
            | tee logs/luci-app-wrtbak-package-source.contents.txt >/dev/null

      - name: Upload package source
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-wrtbak-package-source
          path: dist/luci-app-wrtbak-package-source.tar.gz
          if-no-files-found: error

      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-wrtbak-logs
          path: logs/
          if-no-files-found: error

  openwrt-sdk-build:
    name: OpenWrt SDK build (${{ inputs.arch || 'aarch64_cortex-a53' }})
    runs-on: ubuntu-latest
    needs: package-layout
    if: ${{ github.event_name == 'workflow_dispatch' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Prepare SDK feed
        run: |
          set -euo pipefail
          mkdir -p .sdk-feed/luci-app-wrtbak sdk-artifacts
          tar \
            --exclude=.git \
            --exclude=.github \
            --exclude=.sdk-feed \
            --exclude=sdk-artifacts \
            -cf - . \
            | tar -C .sdk-feed/luci-app-wrtbak -xf -

      - name: Build installable packages
        uses: openwrt/gh-action-sdk@main
        env:
          ARCH: ${{ inputs.arch || 'aarch64_cortex-a53' }}
          ARTIFACTS_DIR: ${{ github.workspace }}/sdk-artifacts
          BUILD_LOG: 1
          CONTAINER: ${{ inputs.container || 'openwrt/sdk' }}
          FEED_DIR: ${{ github.workspace }}/.sdk-feed
          FEEDNAME: wrtbak
          INDEX: 1
          PACKAGES: ${{ inputs.packages || 'luci-app-wrtbak' }}
          V: s

      - name: List SDK artifacts
        run: |
          set -euo pipefail
          wrtbak_dir="sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak"
          test -d "$wrtbak_dir"
          find "$wrtbak_dir" -type f | sort
          test -n "$(find "$wrtbak_dir" -maxdepth 1 -type f \( -name 'luci-app-wrtbak*.ipk' -o -name 'luci-app-wrtbak*.apk' \) -print -quit)"

      - name: Upload SDK packages
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-wrtbak-sdk-${{ inputs.arch || 'aarch64_cortex-a53' }}
          path: |
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/*.ipk
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/*.apk
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/Packages*
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/APKINDEX*
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/index.json
            sdk-artifacts/bin/packages/${{ inputs.arch || 'aarch64_cortex-a53' }}/wrtbak/packages.adb
          if-no-files-found: error

      - name: Upload SDK logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: luci-app-wrtbak-sdk-logs-${{ inputs.arch || 'aarch64_cortex-a53' }}
          path: |
            sdk-artifacts/logs/
            sdk-artifacts/bin/packages/
          if-no-files-found: warn
